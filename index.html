<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XTRA DYNAMICS</title>

  <!-- Classy fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="stage">

  <!-- Background pattern -->
  <canvas id="venom-canvas"></canvas>

  <!-- BRAND -->
  <div id="brand-unit">
    <div id="brand-x">XTRA</div>
    <div id="brand-dynamics">DYNAMICS</div>
  </div>

  <!-- MISSILE SCENE -->
  <div class="scene" id="scene-missile">
    <div id="missile-inner">
      <div id="missile-label">PROTOTYPE — XTRA MK1</div>

      <div id="missile-frame">
        <!-- YOUR VIDEO -->
        <video 
          src="assets/video/missile.mpv"
          autoplay 
          muted 
          loop 
          playsinline>
        </video>
      </div>

      <div id="missile-specs">
        <span class="spec">DESIGNATION <em>XTRA-MK1</em></span>
        <span class="sdiv">|</span>
        <span class="spec">CLASS <em>PROTOTYPE</em></span>
        <span class="sdiv">|</span>
        <span class="spec">STATUS <em>CLASSIFIED</em></span>
      </div>
    </div>
  </div>

  <!-- END -->
  <div class="scene" id="scene-end">
    <div id="end-inner">
      <div id="end-xtr">XTRA</div>
      <div id="end-credit">© REKOILE MEDIA PRODUCTIONS</div>
    </div>
  </div>

</div>

<script src="js/ad.js"></script>
</body>
</html>
