<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XTR DYNAMICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-trail"></div>

  <div id="stage">

    <!-- Single master canvas — Lissajous live here always -->
    <canvas id="bg-canvas"></canvas>

    <!-- Logo canvas — XTR slashes draw here on top -->
    <canvas id="logo-canvas"></canvas>

    <!-- DYNAMICS text — fades in with XTR as one unit -->
    <div id="brand-unit">
      <div id="brand-xtr">
        <span id="bx">X</span><span id="bt">T</span><span id="br">R</span>
      </div>
      <div id="brand-dynamics">DYNAMICS</div>
    </div>

    <!-- MISSILE SCENE -->
    <div class="scene" id="scene-missile">
      <div id="missile-inner">
        <div id="missile-label">PROTOTYPE — MK1</div>
        <div id="missile-frame">
          <!--
            DROP YOUR BLENDER EXPORT HERE:

            Video: <video src="assets/video/missile-rotate.mp4" autoplay muted loop playsinline></video>
          -->  Image: <img src="assets/images/image.png" alt="XTR MK1"/>
        </div>
        <div id="missile-specs">
          <span class="spec">DESIGNATION <em>XTR-MK1</em></span>
          <span class="sdiv">|</span>
          <span class="spec">CLASS <em>PROTOTYPE</em></span>
          <span class="sdiv">|</span>
          <span class="spec">STATUS <em>CLASSIFIED</em></span>
        </div>
      </div>
    </div>

    <!-- END CARD -->
    <div class="scene" id="scene-end">
      <div id="end-inner">
        <div id="end-xtr">
          <span id="ex">X</span><span id="etr">TR</span>
        </div>
        <div id="end-credit">© REKOILE MEDIA PRODUCTIONS. ALL RIGHTS RESERVED.</div>
      </div>
    </div>

  </div>

  <script src="js/ad.js"></script>
</body>
</html>
