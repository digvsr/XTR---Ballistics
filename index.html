<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XTR DYNAMICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="stage">

    <!-- MASTER BACKGROUND CANVAS -->
    <canvas id="bg-canvas"></canvas>

    <!-- SCENE: LOADER -->
    <div class="scene active" id="scene-loader">
      <div id="loader-ui">
        <span id="loader-label">INITIALIZING XTR DYNAMICS</span>
        <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
      </div>
    </div>

    <!-- SCENE: LOGO -->
    <div class="scene" id="scene-logo">
      <div id="logo-stage">
        <canvas id="logo-canvas"></canvas>
        <div id="dynamics-text">DYNAMICS</div>
      </div>
    </div>

    <!-- SCENE: MISSILE (only shown if asset exists) -->
    <div class="scene" id="scene-missile">
      <div id="missile-inner">
        <div id="missile-label">PROTOTYPE — MK1</div>
        <div id="missile-frame">
          <!--
            REPLACE THIS COMMENT WITH YOUR BLENDER EXPORT:

            Video (recommended):
            <video src="assets/video/missile-rotate.mp4" autoplay muted loop playsinline></video>

            Image:
            <img src="assets/images/missile.png" alt="XTR MK1"/>
          -->
        </div>
        <div id="missile-specs">
          <span class="spec">DESIGNATION <em>XTR-MK1</em></span>
          <span class="sdiv">|</span>
          <span class="spec">CLASS <em>PROTOTYPE</em></span>
          <span class="sdiv">|</span>
          <span class="spec">STATUS <em>CLASSIFIED</em></span>
        </div>
      </div>
    </div>

    <!-- SCENE: END CARD -->
    <div class="scene" id="scene-end">
      <div id="end-inner">
        <div id="end-xtr">
          <span id="end-x">X</span><span id="end-tr">TR</span>
        </div>
        <div id="end-credit">© REKOILE MEDIA PRODUCTIONS. ALL RIGHTS RESERVED.</div>
      </div>
    </div>

  </div>
  <script src="js/ad.js"></script>
</body>
</html>
